basePath: /api/v1
definitions:
  github_com_simonkefir_golang-messenger_internal_core_transport_http_response.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  internal_feature_chats_transport_http.ChatDTOResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      participants:
        items:
          $ref: '#/definitions/internal_feature_chats_transport_http.ParticipantDTO'
        type: array
    type: object
  internal_feature_chats_transport_http.CreateChatDTO:
    properties:
      participant_id:
        type: integer
    required:
    - participant_id
    type: object
  internal_feature_chats_transport_http.ParticipantDTO:
    properties:
      user_id:
        type: integer
      username:
        type: string
    type: object
  internal_feature_messages_transport_http.CreateMessageDTO:
    properties:
      content:
        maxLength: 4000
        minLength: 1
        type: string
    required:
    - content
    type: object
  internal_feature_messages_transport_http.MessageDTOResponse:
    properties:
      chat_id:
        type: integer
      content:
        type: string
      id:
        type: integer
      sender_id:
        type: integer
      sent_at:
        type: string
    type: object
  internal_feature_messages_transport_http.PatchMessageDTO:
    properties:
      content:
        maxLength: 4000
        minLength: 1
        type: string
      id:
        minimum: 1
        type: integer
    required:
    - content
    - id
    type: object
  internal_feature_users_transport_http.CreateUserDTO:
    properties:
      email:
        example: alex@mail.com
        type: string
      password:
        example: wasd1234
        minLength: 8
        type: string
      username:
        example: alex
        maxLength: 40
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  internal_feature_users_transport_http.LoginResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOjEsImV4cCI6NDEwMjQ0NDgwMH0.c36q-l2h78e5VqZQ3tZPbMZXZupO4g3M8hnudYMbdOE
        type: string
    type: object
  internal_feature_users_transport_http.LoginUserDTO:
    properties:
      email:
        example: alex@mail.com
        type: string
      password:
        example: wasd1234
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  internal_feature_users_transport_http.PatchUserDTO:
    properties:
      password:
        example: wasd1212
        minLength: 8
        type: string
      username:
        example: alexg
        maxLength: 40
        minLength: 3
        type: string
    type: object
  internal_feature_users_transport_http.UserDTOResponse:
    properties:
      created_at:
        example: "2006-01-02 15:04:05"
        type: string
      email:
        example: alex@mail.com
        type: string
      id:
        example: 1
        type: integer
      username:
        example: alex
        type: string
    type: object
