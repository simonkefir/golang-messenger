basePath: /api/v1
definitions:
  github_com_simonkefir_golang-messenger_internal_core_transport_http_response.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  internal_feature_chats_transport_http.ChatDTOResponse:
    properties:
      created_at:
        example: "2006-01-02 15:04:05"
        type: string
      id:
        example: 333
        type: integer
      participant:
        $ref: '#/definitions/internal_feature_chats_transport_http.ParticipantDTO'
    type: object
  internal_feature_chats_transport_http.ChatListItemDTO:
    properties:
      companion_id:
        example: 141
        type: integer
      companion_name:
        example: alex g
        type: string
      created_at:
        example: "2006-01-02 15:04:05"
        type: string
      id:
        example: 333
        type: integer
    type: object
  internal_feature_chats_transport_http.CreateChatDTO:
    properties:
      participant_id:
        example: 333
        type: integer
    required:
    - participant_id
    type: object
  internal_feature_chats_transport_http.ParticipantDTO:
    properties:
      display_name:
        example: alex g
        type: string
      user_id:
        example: 333
        type: integer
    type: object
  internal_feature_messages_transport_http.CreateMessageDTO:
    properties:
      content:
        example: mary is the girl, who i wanna f..
        maxLength: 4000
        minLength: 1
        type: string
    required:
    - content
    type: object
  internal_feature_messages_transport_http.MessageDTOResponse:
    properties:
      chat_id:
        example: 3
        type: integer
      content:
        example: its not what u r, its just what u did, dont hang up the phone, i
          lov3 u to death, eternal return...
        type: string
      id:
        example: 777
        type: integer
      sender_id:
        example: 333
        type: integer
      sent_at:
        example: "2006-01-02 15:04:05"
        type: string
    type: object
  internal_feature_messages_transport_http.PatchMessageDTO:
    properties:
      content:
        example: mary is the girl, who i wanna kiss
        maxLength: 4000
        minLength: 1
        type: string
      id:
        example: 17174
        minimum: 1
        type: integer
    required:
    - content
    - id
    type: object
  internal_feature_users_transport_http.CreateUserDTO:
    properties:
      display_name:
        example: alex g
        maxLength: 40
        minLength: 1
        type: string
      email:
        example: alex@mail.com
        maxLength: 100
        type: string
      password:
        example: wasd1234
        minLength: 8
        type: string
      username:
        example: alex
        maxLength: 30
        minLength: 1
        type: string
    required:
    - display_name
    - email
    - password
    - username
    type: object
  internal_feature_users_transport_http.LoginResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOjEsImV4cCI6NDEwMjQ0NDgwMH0.c36q-l2h78e5VqZQ3tZPbMZXZupO4g3M8hnudYMbdOE
        type: string
    type: object
  internal_feature_users_transport_http.LoginUserDTO:
    properties:
      email:
        example: alex@mail.com
        maxLength: 100
        type: string
      password:
        example: wasd1234
        minLength: 8
        type: string
      username:
        example: alex
        maxLength: 30
        minLength: 1
        type: string
    required:
    - password
    type: object
  internal_feature_users_transport_http.PatchUserDTO:
    properties:
      display_name:
        example: alex g
        maxLength: 40
        type: string
      email:
        example: alexg@example.com
        maxLength: 100
        type: string
      password:
        example: wasd1212
        minLength: 8
        type: string
      username:
        example: alex
        maxLength: 30
        type: string
    type: object
  internal_feature_users_transport_http.UserDTOResponse:
    properties:
      created_at:
        example: "2006-01-02 15:04:05"
        type: string
      display_name:
        example: alex g
        type: string
      email:
        example: alex@mail.com
        type: string
      id:
        example: 1
        type: integer
      username:
        example: alex
        type: string
    type: object
