services:
  messenger-postgres:
    image: postgres:17-bookworm
    container_name: messenger-env-postgres
    env_file:
      - .env
    environment:
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
    volumes:
        - ${PWD}/out/pgdata:/var/lib/postgresql/data
  
    restart: always

  messenger-postgres-migrate:
      image: migrate/migrate:v4.19.1
      env_file:
        - .env
      volumes:
        - ${PWD}/migrations:/migrations
      command:
        - "-path"
        - "/migrations"
        - "-database"
        - "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@messenger-postgres:5432/${POSTGRES_DB}?sslmode=disable"
        - "up"
      depends_on:
        - messenger-postgres

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: messenger-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:messenger-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"  