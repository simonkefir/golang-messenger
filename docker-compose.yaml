services:
  messenger:
    env_file:
      - .env
    build:
      context: .
      dockerfile: ./cmd/messenger/Dockerfile
    container_name: messenger
    environment:
      - POSTGRES_PORT=5432
      - HTTP_ADDR=:8080
      - HTTP_SHUTDOWN_TIMEOUT=${HTTP_SHUTDOWN_TIMEOUT}
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - LOGGER_LEVEL=${LOGGER_LEVEL}
      - TZ=${TZ}
      - LOGGER_FOLDER=/app/out/logs
      - JWT_TTL=${JWT_TTL}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./out/logs:/app/out/logs
    ports:
      - "8080:8080"
    restart: always
  messenger-postgres:
    image: postgres:17-bookworm
    container_name: messenger-env-postgres
    env_file:
      - .env
    environment:
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
        - TZ=Europe/Moscow
        - PGTZ=Europe/Moscow
    volumes:
        - ./out/pgdata:/var/lib/postgresql/data
  
    restart: always

  messenger-postgres-migrate:
      image: migrate/migrate:v4.19.1
      env_file:
        - .env
      volumes:
        - ./migrations:/migrations
      command:
        - "-path"
        - "/migrations"
        - "-database"
        - "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@messenger-postgres:5432/${POSTGRES_DB}?sslmode=disable"
        - "up"
      depends_on:
        - messenger-postgres

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: messenger-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:messenger-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"  

  swagger:
      build:
        context: .
        dockerfile_inline: |
          FROM golang:1.26-alpine
          RUN apk add --no-cache git
          RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
          WORKDIR /code
          ENTRYPOINT ["swag"]
      volumes:
        - .:/code